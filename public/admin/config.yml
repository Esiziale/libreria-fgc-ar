backend:
  name: git-gateway
  branch: main

media_folder: static/images
public_folder: /images

collections:
  - name: "libreria"
    label: "Libreria"
    folder: "content/libreria"
    create: true
    fields:
      - {label: "Titolo", name: "title", widget: "string"}
      - {label: "Autore", name: "autore", widget: "string"}
      - {label: "Anno", name: "anno", widget: "number"}
      - {label: "Copertina", name: "copertina", widget: "image", required: false}
      - {label: "Descrizione", name: "body", widget: "markdown"}
      - {label: "Tag", name: "tags", widget: "list"}
      - {label: "Pubblicato", name: "draft", widget: "boolean", default: false}

  - name: "iniziative"
    label: "Iniziative"
    folder: "content/iniziative"
    create: true
    fields:
      - {label: "Titolo", name: "title", widget: "string"}
      - {label: "Data", name: "date", widget: "datetime"}
      - {label: "Luogo", name: "luogo", widget: "string"}
      - {label: "Orario", name: "orario", widget: "string"}
      - {label: "Descrizione", name: "body", widget: "markdown"}
      - {label: "Pubblicato", name: "draft", widget: "boolean", default: false}

  - name: "cineforum"
    label: "Cineforum"
    folder: "content/cineforum"
    create: true
    fields:
      - {label: "Titolo film", name: "title", widget: "string"}
      - {label: "Regista", name: "regista", widget: "string"}
      - {label: "Anno film", name: "anno", widget: "number"}
      - {label: "Data proiezione", name: "data_proiezione", widget: "datetime"}
      - {label: "Locandina", name: "locandina", widget: "image", required: false}
      - {label: "PDF scheda", name: "scheda_pdf", widget: "file", required: false}
      - {label: "Descrizione", name: "body", widget: "markdown"}
      - {label: "Pubblicato", name: "draft", widget: "boolean", default: false}
